<style>
  :root{--bg:#0A0E1A;--panel:#111726;--panel-2:#0D1322;--raised:#16203A;--line:#1F2A44;--line-soft:#172033;--text:#EAF0FB;--muted:#8793AE;--muted-2:#566179;--brand:#6E8BFF;--brand-2:#9FB0FF;--mint:#34D8A0;--gold:#F2B45C;--rose:#F2607D;--r:18px;--sb:250px;--maxw:1320px;--fd:'Plus Jakarta Sans',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',ui-monospace,monospace;}
  *{box-sizing:border-box} html{scroll-behavior:smooth}
  body{margin:0;background:radial-gradient(1200px 700px at 82% -12%,rgba(110,139,255,.12),transparent 55%),radial-gradient(1000px 600px at -8% 4%,rgba(52,216,160,.08),transparent 55%),var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
  a{color:inherit;text-decoration:none} ::selection{background:rgba(110,139,255,.32)}
  .bgfx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
  .bgfx .blob{position:absolute;border-radius:50%;filter:blur(90px)}
  .bgfx .b1{width:540px;height:540px;background:radial-gradient(circle,rgba(110,139,255,.16),transparent 70%);top:-180px;right:-60px;animation:drift1 28s ease-in-out infinite}
  .bgfx .b2{width:480px;height:480px;background:radial-gradient(circle,rgba(52,216,160,.12),transparent 70%);bottom:-200px;left:-140px;animation:drift2 34s ease-in-out infinite}
  .bgfx .grid{position:absolute;inset:-60%;background:linear-gradient(rgba(110,139,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(110,139,255,.045) 1px,transparent 1px);background-size:48px 48px;opacity:.45;animation:gridmove 42s linear infinite}
  .bgfx .pdot{position:absolute;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);opacity:.45;animation:swirl ease-in-out infinite}
  @keyframes gridmove{to{transform:translate(48px,48px)}}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-46px,34px) scale(1.09)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(54px,-30px) scale(1.12)}}
  @keyframes swirl{0%,100%{transform:translate(0,0)}50%{transform:translate(var(--dx,40px),var(--dy,-30px))}}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sb);z-index:60;display:flex;flex-direction:column;padding:20px 16px;background:linear-gradient(180deg,#0b1020,#090d18);border-right:1px solid var(--line-soft)}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;margin-bottom:6px;border-bottom:1px solid var(--line-soft)}
  .sb-brand .mark{width:34px;height:34px;border-radius:9px;overflow:hidden;flex:none;filter:drop-shadow(0 4px 12px rgba(110,139,255,.35))}
  .sb-name b{font-family:var(--fd);font-weight:700;font-size:14.5px;letter-spacing:-.02em;display:block;line-height:1.15}
  .sb-name small{font-family:var(--fm);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
  .sb-nav{display:flex;flex-direction:column;gap:3px;margin-top:8px}
  .sb-nav a{display:flex;align-items:center;gap:12px;font-size:13.5px;font-weight:500;color:var(--muted);padding:10px 12px;border-radius:10px;transition:.16s;position:relative}
  .sb-nav a svg{flex:none;color:var(--muted-2)}
  .sb-nav a:hover{color:var(--text);background:rgba(255,255,255,.045)}
  .sb-nav a.active{color:var(--text);background:rgba(110,139,255,.12)}
  .sb-nav a.active svg{color:var(--brand-2)}
  .sb-nav a.active::before{content:"";position:absolute;left:-16px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--brand),var(--mint))}
  .sb-foot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:16px;border-top:1px solid var(--line-soft)}
  .sb-who{font-size:12px;color:var(--muted);padding:0 4px;word-break:break-all}
  .shell{margin-left:var(--sb);padding:28px 30px 40px;min-height:100vh}
  .wrap{max-width:var(--maxw);margin:0 auto}
  .head{margin:4px 0 18px}
  .eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2)}
  .head h1{font-family:var(--fd);font-weight:700;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.025em;margin:7px 0 0}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
  .pchead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .pchead h3{margin:0;font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:-.01em}
  .pchead .pval{font-family:var(--fm);font-size:12px;color:var(--mint)}
  .pipe{display:flex;align-items:flex-start}
  .pstep{flex:1;text-align:center;position:relative}
  .pstep::before{content:"";position:absolute;top:16px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0}
  .pstep:first-child::before{display:none}
  .pstep.done::before,.pstep.now::before{background:linear-gradient(90deg,var(--brand),var(--mint))}
  .pnum{position:relative;z-index:1;width:34px;height:34px;border-radius:50%;margin:0 auto;display:grid;place-items:center;background:var(--raised);border:2px solid var(--line);color:var(--muted-2);font-family:var(--fm);font-size:13px}
  .pstep.done .pnum{background:linear-gradient(150deg,var(--brand),#4a5fd6);border-color:transparent;color:#fff}
  .pstep.now .pnum{border-color:var(--brand);color:var(--brand-2);box-shadow:0 0 0 4px rgba(110,139,255,.15),0 0 22px rgba(110,139,255,.5);animation:ppulse 2.2s ease-in-out infinite}
  @keyframes ppulse{50%{box-shadow:0 0 0 6px rgba(110,139,255,.05),0 0 28px rgba(110,139,255,.7)}}
  .plabel{font-family:var(--fd);font-weight:600;font-size:12px;margin-top:9px;color:var(--muted-2);line-height:1.25;padding:0 4px}
  .pstep.done .plabel,.pstep.now .plabel{color:var(--text)}
  .pnote{margin-top:16px;font-size:13px;color:var(--muted);border-top:1px solid var(--line-soft);padding-top:13px}
  .feed{margin-top:14px;border-top:1px solid var(--line-soft);padding-top:12px}
  .feed .fttl{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}
  .upd{display:flex;gap:11px;padding:8px 0}
  .upd .dot{width:8px;height:8px;border-radius:50%;background:var(--brand);margin-top:6px;flex:none;box-shadow:0 0 8px rgba(110,139,255,.6)}
  .upd .ub{font-size:13.5px}
  .upd .ud{font-family:var(--fm);font-size:10.5px;color:var(--muted-2);margin-top:3px}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 0 18px}
  .kpi{background:var(--panel);border:1px solid var(--line-soft);border-radius:13px;padding:14px;transition:transform .22s,border-color .22s}
  .kpi:hover{transform:translateY(-2px);border-color:rgba(110,139,255,.3)}
  .kpi .l{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
  .kpi .v{font-family:var(--fd);font-weight:700;font-size:22px;letter-spacing:-.02em;margin:7px 0 3px}
  .kpi .v.grad{background:linear-gradient(110deg,var(--brand-2),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}
  .kpi .v.warn{color:var(--rose)}
  .kpi .d{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--muted)}
  .secttitle{font-family:var(--fd);font-weight:700;font-size:15px;margin:22px 0 12px}
  .pback{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:14px;cursor:pointer;background:none;border:none;font-family:var(--fb)}
  .pback:hover{color:var(--brand-2)}
  .phead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .phead h1{font-family:var(--fd);font-weight:700;font-size:clamp(20px,3vw,28px);letter-spacing:-.025em;margin:6px 0 0}
  .phead .sub{font-size:13px;color:var(--muted);margin-top:4px}
  .pgrid{display:grid;grid-template-columns:minmax(0,380px) minmax(0,1fr);gap:18px;align-items:start}
  .pgrid .stack{display:flex;flex-direction:column;gap:18px;min-width:0}
  .card .ch{font-family:var(--fd);font-weight:700;font-size:15px;margin:0 0 4px}
  .card .csub{font-size:12.5px;color:var(--muted);margin:0 0 6px}
  @media (max-width:920px){.pgrid{grid-template-columns:1fr}}
  .snrow{margin-bottom:12px}
  .snrow label{display:flex;align-items:center;gap:8px;margin:0 0 6px}
  .snd{width:9px;height:9px;border-radius:50%;background:var(--line);display:inline-block;flex:none}
  .snd.done{background:var(--brand)} .snd.now{background:var(--mint);box-shadow:0 0 8px var(--mint)}
  .pipe-click .pstep{cursor:pointer}
  .pipe-click .pstep:hover .pnum{border-color:var(--brand-2)}
  .pstep.sel .pnum{box-shadow:0 0 0 3px rgba(159,176,255,.4),0 0 22px rgba(110,139,255,.5)}
  .pstep.sel .plabel{color:var(--text)}
  .sd-wrap{margin-top:18px;border-top:1px solid var(--line-soft);padding-top:16px;animation:rise .35s ease both}
  .sd-tag{font-family:var(--fm);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-2);margin-bottom:8px}
  .sd-dates{font-family:var(--fm);font-size:11.5px;color:var(--mint);margin-bottom:11px;display:flex;align-items:center}
  .dlbl{font-family:var(--fm);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:5px}
  .pswitch{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .ptab{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:10px 15px;cursor:pointer;text-align:left;transition:.16s;display:flex;flex-direction:column;gap:3px;min-width:130px}
  .ptab:hover{border-color:var(--brand);transform:translateY(-1px)}
  .ptab.on{border-color:var(--brand);background:rgba(110,139,255,.12)}
  .ptab-n{font-family:var(--fd);font-weight:700;font-size:13.5px;color:var(--text)}
  .ptab-s{font-family:var(--fm);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2)}
  .ptab.on .ptab-s{color:var(--brand-2)}
  .sd-desc{font-size:14px;color:var(--text);line-height:1.6}
  .sd-pts{list-style:none;padding:0;margin:13px 0 0;display:flex;flex-direction:column;gap:8px}
  .sd-pts li{font-size:13px;color:var(--muted);padding-left:24px;position:relative}
  .sd-pts li::before{content:"";position:absolute;left:0;top:4px;width:14px;height:14px;border-radius:50%;background:rgba(52,216,160,.14);border:1px solid rgba(52,216,160,.5)}
  .sd-note{margin-top:15px;background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.55}
  .sd-note .sd-nl{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--brand-2);margin-bottom:5px}
  .sd-signed{margin-top:15px;color:var(--mint);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .sd-actions{margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .sd-actions .btn,.sd-actions .pill-pay{width:auto;margin-top:0}
  .mnt{margin-top:16px;background:linear-gradient(160deg,rgba(110,139,255,.1),rgba(52,216,160,.06));border:1px solid var(--line);border-radius:13px;padding:18px}
  .mnt h4{font-family:var(--fd);font-size:15px;margin:0 0 4px}
  .mnt .lede{font-size:13px;color:var(--muted);margin:0 0 12px}
  .mnt .mr{display:flex;gap:11px;padding:8px 0;font-size:13px;color:var(--text);align-items:flex-start;border-top:1px solid var(--line-soft)}
  .mnt .mr:first-of-type{border-top:none}
  .mnt .mr svg{flex:none;color:var(--mint);margin-top:2px}
  .mnt .mr b{font-weight:600} .mnt .mr span{color:var(--muted)}
  .mnt .price{font-family:var(--fd);font-weight:800;font-size:24px;letter-spacing:-.02em;margin-top:14px}
  .mnt .price small{font-size:13px;color:var(--muted);font-weight:600}
  .mnt .pinc{font-size:12px;color:var(--muted);margin-top:4px}
  .inv{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;margin-bottom:12px;flex-wrap:wrap;animation:rise .5s cubic-bezier(.2,.7,.2,1) both;transition:border-color .18s,transform .18s,box-shadow .18s}
  .inv:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 18px 40px -28px rgba(110,139,255,.6)}
  .inv.overdue{border-color:rgba(242,96,125,.4)}
  .inv .meta{flex:1;min-width:200px}
  .inv .num{font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--brand-2)}
  .inv .desc{font-weight:600;margin:3px 0 2px;letter-spacing:-.01em}
  .inv .due{font-size:12.5px;color:var(--muted)}
  .inv .due.od{color:var(--rose);font-weight:600}
  .inv .right{display:flex;align-items:center;gap:14px;margin-left:auto}
  .inv .amt{font-family:var(--fd);font-weight:700;font-size:19px;letter-spacing:-.02em}
  .pill-pay{font-size:12px;font-weight:700;font-family:var(--fd);padding:9px 16px;border-radius:10px;border:none;cursor:pointer;color:#fff;background:linear-gradient(110deg,var(--brand),#4a5fd6);position:relative;overflow:hidden;transition:.18s}
  .pill-pay:hover{transform:translateY(-1px)}
  .pill-pay::after{content:"";position:absolute;top:0;left:-60%;width:42%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.38),transparent);transform:skewX(-18deg)}
  .pill-pay:hover::after{animation:sheen .9s ease}
  @keyframes sheen{0%{left:-60%}60%,100%{left:130%}}
  .badge{font-size:11px;font-weight:700;font-family:var(--fm);letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;border-radius:8px;display:inline-flex;align-items:center;gap:6px}
  .badge.paid{color:var(--mint);background:rgba(52,216,160,.1);border:1px solid rgba(52,216,160,.28)}
  .badge.void{color:var(--muted);background:rgba(135,147,174,.08);border:1px solid var(--line)}
  .badge.stage{color:var(--brand-2);background:rgba(110,139,255,.12);border:1px solid rgba(110,139,255,.3)}
  .badge.od{color:var(--rose);background:rgba(242,96,125,.1);border:1px solid rgba(242,96,125,.3)}
  .badge .bd{width:6px;height:6px;border-radius:50%;background:currentColor}
  .rcpt{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-family:var(--fb)}
  .rcpt:hover{border-color:var(--brand);color:var(--text)}
  .empty{text-align:center;color:var(--muted);padding:44px 20px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px}
  .empty .big{font-family:var(--fd);font-weight:700;font-size:18px;color:var(--text);margin-bottom:6px}
  .skel{height:74px;border-radius:14px;background:linear-gradient(90deg,var(--panel),var(--raised),var(--panel));background-size:200% 100%;animation:sh 1.3s linear infinite;margin-bottom:12px}
  @keyframes sh{to{background-position:-200% 0}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .crow{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;margin-bottom:11px;flex-wrap:wrap;transition:border-color .18s,transform .18s}
  .crow:hover{border-color:var(--brand);transform:translateY(-2px)}
  .crow .cmeta{flex:1;min-width:180px}
  .crow .cname{font-family:var(--fd);font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .crow .cmail{font-size:12.5px;color:var(--muted)}
  .crow .od-dot{width:8px;height:8px;border-radius:50%;background:var(--rose);box-shadow:0 0 8px var(--rose)}
  .crow .cstat{display:flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap}
  .crow .cbal{font-family:var(--fd);font-weight:700;font-size:16px;text-align:right}
  .crow .cbal small{display:block;font-family:var(--fm);font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
  label{display:block;font-family:var(--fm);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
  input,select,textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;color:var(--text);font-size:15px;font-family:var(--fb);padding:12px 14px;outline:none;transition:.16s}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(110,139,255,.16)}
  input:disabled{opacity:.6}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{border:none;border-radius:11px;padding:13px 18px;font-size:14px;font-weight:700;font-family:var(--fd);color:#fff;background:linear-gradient(110deg,var(--brand),#4a5fd6);cursor:pointer;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 22px -8px rgba(110,139,255,.7)}
  .btn:hover{transform:translateY(-1px)} .btn:disabled{opacity:.55;cursor:default;transform:none}
  .btn.full{width:100%;margin-top:8px}
  .btn-ghost{background:var(--raised);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn-ghost:hover{border-color:var(--brand);transform:none}
  .pill{font-family:var(--fd);font-weight:600;font-size:13px;padding:10px 16px;border-radius:11px;cursor:pointer;border:none;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}

  /* ---------- payment ---------- */
  async function openPay(inv){
    activeInvoice=inv; $("payTitle").textContent="Pay "+inv.number; $("payNum").textContent=inv.description; $("payTotal").textContent=fmt(inv.amount_cents);
    setPayMsg("Setting up secure payment…","info"); $("payBtn").disabled=true; $("payBtn").textContent="Pay "+fmt(inv.amount_cents);
    show($("overlay"),true); $("overlay").classList.add("on");
    const token=(await sb.auth.getSession()).data.session.access_token;
    let res; try{ res=await fetch("/.netlify/functions/create-payment-intent",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({invoice_id:inv.id})}); }catch(e){ setPayMsg("Network error. Please try again.","err"); return; }
    const j=await res.json(); if(!res.ok){ setPayMsg(j.error||"Couldn't start payment.","err"); return; }
    const appearance={theme:"night",variables:{colorPrimary:"#6E8BFF",colorBackground:"#0D1322",colorText:"#EAF0FB",colorTextSecondary:"#8793AE",colorDanger:"#F2607D",fontFamily:"Inter, system-ui, sans-serif",borderRadius:"11px"}};
    elements=stripe.elements({clientSecret:j.client_secret,appearance}); elements.create("payment",{layout:"tabs"}).mount("#payment-element");
    setPayMsg("","info"); $("payBtn").disabled=false;
  }
  async function pay(){
    if(!elements)return; $("payBtn").disabled=true; setPayMsg("Processing…","info"); sessionStorage.setItem("avi_pay_invoice",activeInvoice.id);
    const { error, paymentIntent }=await stripe.confirmPayment({ elements, confirmParams:{ return_url:location.origin+location.pathname }, redirect:"if_required" });
    if(error){ setPayMsg(error.message||"Payment failed.","err"); $("payBtn").disabled=false; return; }
    await finalize(activeInvoice.id,paymentIntent.id);
  }
  async function finalize(invoiceId,piId){
    setPayMsg("Confirming…","info"); const token=(await sb.auth.getSession()).data.session.access_token;
    let j; try{ const r=await fetch("/.netlify/functions/confirm-payment",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({invoice_id:invoiceId,payment_intent_id:piId})}); j=await r.json(); }catch(e){ setPayMsg("Couldn't confirm. If money left your account, contact us.","err"); return; }
    sessionStorage.removeItem("avi_pay_invoice");
    if(j.status==="paid"){ setPayMsg("Paid in full — thank you!","ok"); setTimeout(closePay,1400); loadClient(); }
    else if(j.status==="processing"){ setPayMsg("Bank payment submitted. It clears in a few business days.","ok"); setTimeout(closePay,2200); loadClient(); }
    else { setPayMsg("Payment status: "+j.status+".","info"); $("payBtn").disabled=false; }
  }
  function closePay(){ $("overlay").classList.remove("on"); show($("overlay"),false); if(elements){try{$("payment-element").innerHTML="";}catch(e){} elements=null;} setPayMsg("","info"); activeInvoice=null; }
  function setPayMsg(t,k){ const m=$("payMsg"); m.textContent=t; m.className="msg "+(k||"info"); }
  async function handleReturn(){ const p=new URLSearchParams(location.search); const piId=p.get("payment_intent"); const invoiceId=sessionStorage.getItem("avi_pay_invoice"); if(piId&&invoiceId){ history.replaceState({},"",location.pathname); const { data:{ session } }=await sb.auth.getSession(); if(session){ show($("overlay"),true); $("overlay").classList.add("on"); await finalize(invoiceId,piId); } } }

  $("signin").addEventListener("click",signIn);
  $("password").addEventListener("keydown",e=>{ if(e.key==="Enter") signIn(); });
  async function signIn(){ const email=$("email").value.trim(), password=$("password").value; if(!email||!password){ $("loginMsg").textContent="Enter your email and password."; return; } $("signin").disabled=true; $("loginMsg").textContent=""; const { data, error }=await sb.auth.signInWithPassword({email,password}); $("signin").disabled=false; if(error){ $("loginMsg").textContent="That email or password didn't work."; return; } enterApp(data.session); }
  $("logout").addEventListener("click",async()=>{ await sb.auth.signOut(); showLogin(); });
  $("payBtn").addEventListener("click",pay);
  $("payCancel").addEventListener("click",closePay);
  $("overlay").addEventListener("click",e=>{ if(e.target===$("overlay")) closePay(); });
  $("navPrimary").addEventListener("click",e=>{ e.preventDefault(); if(me&&me.role==="admin"){ adminShow("dash"); loadAdmin(); } document.body.classList.remove("nav-open"); });
  $("hamb").addEventListener("click",()=>document.body.classList.toggle("nav-open"));
  $("scrim").addEventListener("click",()=>document.body.classList.remove("nav-open"));
  boot().then(handleReturn);
})();
</script>
</body>
</html>
